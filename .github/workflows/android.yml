name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip project
        run: unzip opencity2.zip -d project

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 3.6.2-stable
          use-dotnet: false
          include-templates: true

      - name: Check project files
        run: |
          ls project
          ls project/OpenCity

      - name: Build APK
        working-directory: project/OpenCity
        run: |
          godot --headless --export-release "Android" OpenCity.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: project/OpenCity/OpenCity.apk
